services:
  pihole:
    container_name: pihole_v6
    image: devzwf/pihole-dot-doh:2026.07.2-z01
    ports:
      # DNS Ports
      - "53:53/tcp"
      - "53:53/udp"
      # Default HTTP Port
      - "80:80/tcp"
      # Default HTTPs Port. FTL will generate a self-signed certificate
      - "443:443/tcp"
      # Uncomment the below if using Pi-hole as your DHCP Server
      #- "67:67/udp"
    environment:
      # Set the appropriate timezone for your location (https://en.wikipedia.org/wiki/List_of_tz_database_time_zones), e.g:
      TZ: 'America/Los_Angeles'
      # Set a password to access the web interface. Not setting one will result in a random password being assigned
      FTLCONF_webserver_api_password: 'Riveting2-Deluge-Java'
      FTLCONF_dns_upstreams: '127.1.1.1#5153;127.0.0.1#5335'
      FTLCONF_dns_listeningMode: 'all'
    # Volumes store your data between container upgrades
    volumes:
      # For persisting Pi-hole's databases and common configuration file
      - './piholev6/etc-pihole:/etc/pihole'
      - './piholev6/config/:/config'
      - './piholev6/log:/var/log'
    restart: always

    # Uncomment the below if you have custom dnsmasq config files that you want to persist. Not needed for most.
      #- './piholev6/etc-dnsmasq.d:/etc/dnsmasq.d'

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    network_mode: host
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
      - ${STORAGE_DIR}:/storage
    environment:
      - TZ=${TZ}
      - WATCHTOWER_MONITOR_ONLY=false
      - WATCHTOWER_SCHEDULE= 0 0 04 * * * #At 04:00 AM everyday
      # Remove old images after updating to save disk space
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true

    cap_add:
      # See https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
      # Required if you are using Pi-hole as your DHCP server, else not needed
      - NET_ADMIN
      - CAP_SYS_NICE
    restart: unless-stopped
